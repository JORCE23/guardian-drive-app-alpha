<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Guardian Drive Alpha - Test Mode</title>
    
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #deff9a; }
        .nav-btn { color: #64748b; }
        
        /* Efectos Visuales */
        .onda-alerta {
            width: 50px; height: 50px;
            background-color: rgba(239, 68, 68, 0.4);
            border: 2px solid #ef4444;
            border-radius: 50%;
            animation: onda-pulso 1.5s infinite ease-out;
            transform: translate(-50%, -50%);
        }
        @keyframes onda-pulso {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .mi-ubicacion {
            width: 16px; height: 16px;
            background-color: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px #3b82f6;
        }
    </style>
</head>
<body class="w-full h-screen">

    <div id="pantalla-registro" class="absolute top-0 left-0 w-full h-screen bg-[#0f172a] z-[9999] flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white tracking-widest uppercase mb-2">Guardian<span class="text-[#deff9a]">Drive</span></h1>
            <p class="text-[#64748b] text-sm">Registro de Nodo Alpha</p>
        </div>

        <div class="bg-[#1e293b] p-6 rounded-2xl border border-[#334155] shadow-2xl">
            <div class="mb-4">
                <label class="block text-xs font-bold text-[#94a3b8] mb-2 uppercase">Nombre Conductor</label>
                <input type="text" id="reg-nombre" placeholder="Tu nombre" class="w-full bg-[#0f172a] border border-[#334155] text-white rounded-lg p-4 text-sm outline-none focus:border-[#deff9a]">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-bold text-[#94a3b8] mb-2 uppercase">Patente Vehículo</label>
                <input type="text" id="reg-patente" placeholder="LXYZ-99" class="w-full bg-[#0f172a] border border-[#334155] text-white rounded-lg p-4 text-sm uppercase outline-none focus:border-[#deff9a]">
            </div>
            <div class="mb-8">
                <label class="block text-xs font-bold text-[#94a3b8] mb-2 uppercase">Marca y Modelo</label>
                <input type="text" id="reg-modelo" placeholder="Ej: Opel Corsa 2022" class="w-full bg-[#0f172a] border border-[#334155] text-white rounded-lg p-4 text-sm outline-none focus:border-[#deff9a]">
            </div>
            <button onclick="completarRegistro()" class="w-full bg-[#deff9a] text-[#0f172a] font-bold py-4 rounded-lg shadow-[0_0_20px_rgba(222,255,154,0.3)] uppercase tracking-wide">
                Ingresar a la Red
            </button>
        </div>
    </div>


    <div id="pantalla-principal" class="hidden flex-col h-screen w-full relative">
        
        <div class="pt-12 pb-4 px-6 bg-[#1e293b] border-b border-[#334155] shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-white uppercase tracking-wider">Guardian<span class="text-[#deff9a]">Drive</span></h1>
                <p id="conexion-txt" class="text-[10px] text-yellow-400 font-mono">Conectando a nodo central...</p>
            </div>
            <div id="luz-mesh" class="w-3 h-3 bg-yellow-400 rounded-full animate-pulse"></div>
        </div>

        <div class="flex-1 px-6 pt-6 relative">
            
            <div id="tab-mapa" class="tab-content active">
                <h2 class="text-xs uppercase font-bold text-[#deff9a] mb-3">Radar GPS Táctico</h2>
                <div class="bg-black p-1 rounded-xl border-2 border-[#334155] relative">
                    <div id="map" class="w-full h-[60vh] rounded-lg"></div>
                    <button onclick="centrarGPS()" class="absolute bottom-4 right-4 z-[400] bg-[#1e293b] text-white p-3 rounded-full border border-[#64748b] shadow-lg">
                        🎯
                    </button>
                </div>
            </div>

            <div id="tab-ia" class="tab-content">
                <h2 class="text-xs uppercase font-bold text-[#deff9a] mb-3">Escáner y Alertas</h2>
                <div class="relative w-full rounded-xl overflow-hidden border-2 border-[#334155] bg-black">
                    <video id="webcam" autoplay playsinline muted class="w-full h-64 object-cover opacity-80"></video>
                    
                    <button onclick="enviarAlertaEncerrona()" class="absolute bottom-4 right-4 bg-red-600 text-white p-4 rounded-full shadow-[0_0_20px_rgba(239,68,68,0.9)] font-bold text-xs uppercase animate-pulse border-2 border-white">
                        S.O.S (Test Mesh)
                    </button>
                </div>
                <div id="ia-log" class="mt-4 text-[10px] text-[#94a3b8] font-mono h-32 overflow-hidden leading-relaxed bg-[#1e293b] p-3 rounded-lg border border-[#334155]">
                    > Consola del sistema iniciada...<br>
                </div>
            </div>

            <div id="tab-perfil" class="tab-content">
                <h2 class="text-xs uppercase font-bold text-[#deff9a] mb-3">Mi Perfil</h2>
                <div class="bg-[#1e293b] rounded-xl border border-[#334155] p-5">
                    <p class="text-xs text-[#94a3b8] mb-1">Nombre</p>
                    <p id="perfil-nombre" class="text-white font-bold text-lg mb-4">-</p>
                    <p class="text-xs text-[#94a3b8] mb-1">Patente Activa</p>
                    <p id="perfil-patente" class="text-[#deff9a] font-mono text-xl mb-4 uppercase">-</p>
                    <p class="text-xs text-[#94a3b8] mb-1">Vehículo</p>
                    <p id="perfil-modelo" class="text-white mb-6">-</p>
                    
                    <button onclick="cerrarSesion()" class="w-full border border-red-500 text-red-500 py-3 rounded-lg text-sm font-bold uppercase">Borrar Datos y Salir</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-[#0f172a] border-t border-[#334155] px-6 py-3 flex justify-between z-50 pb-6">
            <button onclick="switchTab('mapa', this)" class="nav-btn active flex flex-col items-center w-1/3">
                <span class="text-2xl mb-1">🗺️</span>
                <span class="text-[10px] font-bold uppercase">Radar</span>
            </button>
            <button onclick="switchTab('ia', this)" class="nav-btn flex flex-col items-center w-1/3">
                <span class="text-2xl mb-1">📷</span>
                <span class="text-[10px] font-bold uppercase">Cámara</span>
            </button>
            <button onclick="switchTab('perfil', this)" class="nav-btn flex flex-col items-center w-1/3">
                <span class="text-2xl mb-1">👤</span>
                <span class="text-[10px] font-bold uppercase">Perfil</span>
            </button>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL ---
        let miLat = -36.8201; // Default Concepción
        let miLng = -73.0444;
        let miMarcador = null;
        let mqttClient = null;
        let map = null;
        const TOPIC_SECRETO = 'guardian/test/chile'; // Canal de pruebas

        // --- 1. LÓGICA DE REGISTRO E INICIO ---
        function verificarSesion() {
            if(localStorage.getItem('gd_patente')) {
                // Si ya hay datos, oculta registro y muestra app
                document.getElementById('pantalla-registro').classList.add('hidden');
                document.getElementById('pantalla-principal').classList.remove('hidden');
                document.getElementById('pantalla-principal').classList.add('flex');
                
                // Cargar datos en el perfil
                document.getElementById('perfil-nombre').innerText = localStorage.getItem('gd_nombre');
                document.getElementById('perfil-patente').innerText = localStorage.getItem('gd_patente');
                document.getElementById('perfil-modelo').innerText = localStorage.getItem('gd_modelo');
                
                // Iniciar motores solo cuando ya está logueado
                iniciarMotores();
            }
        }

        function completarRegistro() {
            const nom = document.getElementById('reg-nombre').value;
            const pat = document.getElementById('reg-patente').value;
            const mod = document.getElementById('reg-modelo').value;
            
            if(!nom || !pat || !mod) return alert("Completa todos los campos para testear.");
            
            localStorage.setItem('gd_nombre', nom);
            localStorage.setItem('gd_patente', pat);
            localStorage.setItem('gd_modelo', mod);
            
            verificarSesion(); // Entrar a la app
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload(); // Recarga la página volviendo al registro
        }

        // --- 2. INICIAR MAPA Y SENSORES ---
        function iniciarMotores() {
            // Iniciar Mapa (Solo se ejecuta una vez)
            if(!map) {
                map = L.map('map').setView([miLat, miLng], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                setTimeout(() => map.invalidateSize(), 500); // Forzar renderizado
            }

            obtenerGPS();
            conectarMeshRobusta();
            encenderCamara();
        }

        // --- 3. GPS ---
        function obtenerGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    miLat = position.coords.latitude;
                    miLng = position.coords.longitude;
                    
                    if(miMarcador) map.removeLayer(miMarcador);
                    const iconUbicacion = L.divIcon({ className: 'mi-ubicacion', iconSize: [16,16] });
                    miMarcador = L.marker([miLat, miLng], {icon: iconUbicacion}).addTo(map);
                }, (error) => {
                    logConsole("Error: Activa el GPS de tu celular.");
                }, { enableHighAccuracy: true });
            }
        }
        function centrarGPS() { if(map) map.setView([miLat, miLng], 16); }

        // --- 4. RED MESH (HiveMQ - Más estable) ---
        function conectarMeshRobusta() {
            logConsole("Conectando a broker HiveMQ...");
            // Nuevo broker industrial
            mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
            
            mqttClient.on('connect', () => {
                document.getElementById('conexion-txt').innerText = "Red Mesh Activa";
                document.getElementById('conexion-txt').classList.replace('text-yellow-400', 'text-[#deff9a]');
                document.getElementById('luz-mesh').classList.replace('bg-yellow-400', 'bg-[#deff9a]');
                logConsole("Sincronización Mesh exitosa.");
                
                mqttClient.subscribe(TOPIC_SECRETO);
            });

            mqttClient.on('error', (err) => {
                logConsole("Fallo de conexión MQTT. Reintentando...");
            });

            // Recibir alerta del amigo
            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                
                logConsole(`⚠️ ALERTA RECIBIDA de ${data.nombre} (${data.patente})`);
                
                const iconOnda = L.divIcon({ className: 'onda-alerta', iconSize: [50,50] });
                L.marker([data.lat, data.lng], {icon: iconOnda}).addTo(map)
                 .bindPopup(`<b>S.O.S RECIBIDO</b><br>Patente: ${data.patente}<br>Conductor: ${data.nombre}`).openPopup();
                 
                map.setView([data.lat, data.lng], 15);
                alert(`¡Alerta de ${data.nombre}! Revisa el mapa.`);
            });
        }

        // --- 5. ENVIAR ALERTA ---
        function enviarAlertaEncerrona() {
            if(!mqttClient || !mqttClient.connected) {
                alert("Sin conexión. Espera a que la luz superior esté verde.");
                return;
            }
            
            const payload = {
                lat: miLat,
                lng: miLng,
                nombre: localStorage.getItem('gd_nombre'),
                patente: localStorage.getItem('gd_patente'),
                timestamp: Date.now()
            };
            
            mqttClient.publish(TOPIC_SECRETO, JSON.stringify(payload));
            logConsole("Alerta disparada a toda la red.");
        }

        // --- 6. CÁMARA (Sin IA pesada para no bloquear pruebas) ---
        async function encenderCamara() {
            try {
                const video = document.getElementById('webcam');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (e) {
                logConsole("Cámara bloqueada o no disponible.");
            }
        }

        // --- UTILIDADES ---
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btnElement.classList.add('active');
            if(tabId === 'mapa' && map) { setTimeout(() => map.invalidateSize(), 100); }
        }

        function logConsole(msg) {
            const consola = document.getElementById('ia-log');
            const hora = new Date().toLocaleTimeString();
            consola.innerHTML = `> [${hora}] ${msg}<br>` + consola.innerHTML;
        }

        // --- ARRANQUE INICIAL ---
        verificarSesion();

    </script>
</body>
</html>
