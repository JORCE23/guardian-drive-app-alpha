<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Guardian Drive Alpha - Realtime</title>
    
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #deff9a; }
        .nav-btn { color: #64748b; }
        
        /* Animación de la Onda de Calor / Encerrona */
        .onda-alerta {
            width: 40px;
            height: 40px;
            background-color: rgba(239, 68, 68, 0.6);
            border: 2px solid #ef4444;
            border-radius: 50%;
            animation: onda-pulso 1.5s infinite ease-out;
            transform: translate(-50%, -50%);
        }
        @keyframes onda-pulso {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
        
        /* Marcador de mi ubicación */
        .mi-ubicacion {
            width: 15px; height: 15px;
            background-color: #3b82f6;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px #3b82f6;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="pt-12 pb-4 px-6 bg-[#1e293b] border-b border-[#334155] shadow-lg z-10 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-white tracking-widest uppercase">Guardian<span class="text-[#deff9a]">Drive</span></h1>
            <p id="conexion-txt" class="text-xs text-yellow-400">Conectando a Red Mesh...</p>
        </div>
        <div class="w-3 h-3 bg-[#deff9a] rounded-full animate-pulse shadow-[0_0_10px_rgba(222,255,154,0.8)]"></div>
    </div>

    <div class="flex-1 px-6 pt-6 relative">

        <div id="tab-mapa" class="tab-content active">
            <h2 class="text-sm uppercase font-bold text-[#deff9a] mb-4 border-l-4 border-[#deff9a] pl-2">Radar GPS Táctico</h2>
            <div class="bg-[#1e293b] p-1 rounded-xl border border-[#334155] shadow-xl relative">
                <div id="map" class="w-full h-[60vh] rounded-lg"></div>
                <button onclick="centrarGPS()" class="absolute bottom-4 right-4 z-[400] bg-[#0f172a] text-white p-2 rounded-full border border-[#334155]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </button>
            </div>
            <p class="text-xs text-[#94a3b8] mt-3 text-center">Sincronizado con base de datos en tiempo real</p>
        </div>

        <div id="tab-ia" class="tab-content">
            <h2 class="text-sm uppercase font-bold text-[#deff9a] mb-4 border-l-4 border-[#deff9a] pl-2">Escáner Perimetral</h2>
            <div class="relative w-full rounded-xl overflow-hidden border-2 border-[#334155] bg-black">
                <video id="webcam" autoplay playsinline muted class="w-full h-64 object-cover opacity-80"></video>
                <div id="ai-status" class="absolute top-3 left-3 bg-[#0f172a]/90 text-[#deff9a] text-xs px-3 py-1.5 rounded border border-[#deff9a]/50">Motor IA en reposo</div>
                
                <button onclick="enviarAlertaEncerrona()" class="absolute bottom-3 right-3 bg-red-600/90 text-white p-4 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)] font-bold text-xs uppercase animate-bounce">
                    Alerta Mesh
                </button>
            </div>
            <button id="btn-ia" class="mt-6 w-full bg-[#deff9a] text-[#0f172a] font-bold py-4 rounded-xl text-sm uppercase">Iniciar IA Local</button>
            <div id="ia-log" class="mt-4 text-[10px] text-[#64748b] font-mono h-20 overflow-hidden leading-tight"></div>
        </div>

        <div id="tab-vehiculo" class="tab-content">
            <h2 class="text-sm uppercase font-bold text-[#deff9a] mb-4 border-l-4 border-[#deff9a] pl-2">Enlace Hardware IoT</h2>
            <div class="bg-[#1e293b] rounded-xl border border-[#334155] p-5">
                <div class="mb-4">
                    <label class="block text-xs text-[#94a3b8] mb-1">Patente</label>
                    <input type="text" id="db-patente" class="w-full bg-[#0f172a] border border-[#334155] text-white rounded p-3 text-sm uppercase">
                </div>
                <div class="mb-4">
                    <label class="block text-xs text-[#94a3b8] mb-1">Marca / Modelo</label>
                    <input type="text" id="db-modelo" class="w-full bg-[#0f172a] border border-[#334155] text-white rounded p-3 text-sm">
                </div>
                <button onclick="guardarEnBaseDeDatos()" class="w-full border border-[#deff9a] text-[#deff9a] font-bold py-3 rounded-lg text-sm">Registrar en DB Alpha</button>
                <p id="msg-vehiculo" class="text-xs text-center text-green-400 mt-3 hidden">Datos guardados localmente.</p>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-[#334155] px-6 py-4 flex justify-between items-center z-50 pb-8">
        <button onclick="switchTab('mapa', this)" class="nav-btn active flex flex-col items-center w-1/3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            <span class="text-[10px] font-bold uppercase">Radar</span>
        </button>
        <button onclick="switchTab('ia', this)" class="nav-btn flex flex-col items-center w-1/3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Escáner</span>
        </button>
        <button onclick="switchTab('vehiculo', this)" class="nav-btn flex flex-col items-center w-1/3">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Registro</span>
        </button>
    </div>

    <script>
        // --- 1. ESTADO GLOBAL Y MAPA ---
        let miLat = -36.8201; // Default a Concepción
        let miLng = -73.0444;
        let miMarcador = null;
        let mqttClient = null;
        const TOPIC_SECRETO = 'guardian-drive/alpha/encerronas'; // Canal de la base de datos IoT

        // Iniciar Mapa
        var map = L.map('map').setView([miLat, miLng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Iconos personalizados
        const iconUbicacion = L.divIcon({ className: 'mi-ubicacion', iconSize: [15,15] });
        const iconOndaCalor = L.divIcon({ className: 'onda-alerta', iconSize: [40,40] });

        // --- 2. GPS REAL ---
        function obtenerGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    miLat = position.coords.latitude;
                    miLng = position.coords.longitude;
                    
                    if(miMarcador) { map.removeLayer(miMarcador); }
                    miMarcador = L.marker([miLat, miLng], {icon: iconUbicacion}).addTo(map);
                    
                }, (error) => {
                    console.log("Error GPS. Activa tu ubicación.");
                }, { enableHighAccuracy: true });
            }
        }
        
        function centrarGPS() {
            map.setView([miLat, miLng], 16);
        }

        // --- 3. CONEXIÓN A BASE DE DATOS EN TIEMPO REAL (MQTT) ---
        function conectarMesh() {
            // Usamos un broker público gratuito ideal para prototipos Alpha
            mqttClient = mqtt.connect('wss://broker.emqx.io:8083/mqtt');
            
            mqttClient.on('connect', () => {
                document.getElementById('conexion-txt').innerText = "Mesh Sincronizada (Online)";
                document.getElementById('conexion-txt').className = "text-xs text-[#deff9a]";
                mqttClient.subscribe(TOPIC_SECRETO); // Nos suscribimos a escuchar señales
            });

            // Cuando tu amigo manda la señal desde otra ciudad, entra por aquí:
            mqttClient.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                
                // Mostrar la onda de calor roja en el mapa donde él esté
                L.marker([data.lat, data.lng], {icon: iconOndaCalor}).addTo(map)
                 .bindPopup(`⚠️ ALERTA DE RIESGO<br>Patente: ${data.patente}`).openPopup();
                 
                // Centrar el mapa en la alerta si tienes la app abierta
                map.setView([data.lat, data.lng], 15);
                
                document.getElementById('ia-log').innerHTML = `> ALERTA MESH RECIBIDA desde otra ubicación.<br>` + document.getElementById('ia-log').innerHTML;
            });
        }

        // --- 4. ENVIAR SEÑAL A DISTANCIA ---
        function enviarAlertaEncerrona() {
            if(!mqttClient || !mqttClient.connected) return alert("Sin conexión a la red Mesh.");
            
            let patenteGuardada = localStorage.getItem('gd_patente') || "Desconocida";
            
            // Armamos el paquete de datos para la base
            const payload = {
                lat: miLat,
                lng: miLng,
                tipo: 'encerrona',
                patente: patenteGuardada,
                timestamp: Date.now()
            };
            
            // Disparamos la señal al servidor. Tu amigo la recibirá al instante.
            mqttClient.publish(TOPIC_SECRETO, JSON.stringify(payload));
            alert("Señal cifrada enviada a la base de datos y Red Mesh.");
        }

        // --- 5. REGISTRO EN BASE DE DATOS (Local Storage para Alpha) ---
        function guardarEnBaseDeDatos() {
            const pat = document.getElementById('db-patente').value;
            const mod = document.getElementById('db-modelo').value;
            localStorage.setItem('gd_patente', pat);
            localStorage.setItem('gd_modelo', mod);
            document.getElementById('msg-vehiculo').classList.remove('hidden');
            setTimeout(()=> document.getElementById('msg-vehiculo').classList.add('hidden'), 3000);
        }

        // --- 6. NAVEGACIÓN Y CÁMARA IA ---
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btnElement.classList.add('active');
            if(tabId === 'mapa') { setTimeout(() => map.invalidateSize(), 100); }
        }

        document.getElementById('btn-ia').addEventListener('click', async () => {
            const video = document.getElementById('webcam');
            document.getElementById('ai-status').innerText = "Cargando IA...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                const model = await cocoSsd.load();
                document.getElementById('ai-status').innerText = "Escaneando...";
                
                setInterval(async () => {
                    const predictions = await model.detect(video);
                    const amenaza = predictions.find(p => p.class === 'car' || p.class === 'person');
                    if(amenaza && amenaza.score > 0.60) {
                        document.getElementById('ai-status').innerText = `Riesgo detectado`;
                        document.getElementById('ai-status').classList.add('text-red-500');
                    }
                }, 1500);
            } catch (err) { alert("Error cámara"); }
        });

        // --- INICIAR TODO ---
        obtenerGPS();
        conectarMesh();
        
        // Cargar base de datos local si existe
        if(localStorage.getItem('gd_patente')) {
            document.getElementById('db-patente').value = localStorage.getItem('gd_patente');
            document.getElementById('db-modelo').value = localStorage.getItem('gd_modelo');
        }
        
    </script>
</body>
</html>
